name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Tolerate corepack versions predating the 2025 npm signing-key rotation.
  COREPACK_INTEGRITY_KEYS: "0"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Check out codegen source (monolith schema.json)
        # The typed API surface is generated from the all-modules monolith's
        # committed OpenAPI schema.json (docs/flow-system.md §0.1); it lives in
        # a sibling repo, so the drift gate needs it checked out here.
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-example-monolith
          path: .codegen-source

      - name: API type drift gate (gen:api:check)
        # Regenerates packages/core/src/generated/schema.ts from the monolith
        # schema and fails if the committed types diverge — without this the
        # frontend types silently drift from the API when a serializer changes.
        run: corepack pnpm gen:api:check
        env:
          API_SCHEMA: ${{ github.workspace }}/.codegen-source/codegen/generated/schema.json

      - name: Lint, test, build
        run: corepack pnpm turbo run lint test build

      - name: Standalone build gate (frontend-standard §7)
        run: |
          for pkg in packages/*/; do
            echo "--- standalone build: $pkg"
            (cd "$pkg" && corepack pnpm run build)
          done

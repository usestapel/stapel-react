name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Tolerate corepack versions predating the 2025 npm signing-key rotation.
  COREPACK_INTEGRITY_KEYS: "0"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Check out codegen source (monolith schema.json)
        # The typed API surface is generated from the all-modules monolith's
        # committed OpenAPI schema.json (docs/flow-system.md §0.1); it lives in
        # a sibling repo, so the drift gate needs it checked out here.
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-example-monolith
          path: .codegen-source

      - name: Check out error-registry sources (stapel-auth + stapel-core)
        # The generated backend-error map (gen:errors) reads the auth module's
        # error registry plus the stapel-core verification registry. These are
        # sibling backend repos, so the drift gate needs them checked out here.
        # (Long-term the backend should emit an `errors.json` codegen artifact
        # alongside schema.json/flows.json — task `error-remediation` — collapsing
        # this to the single `.codegen-source` checkout.)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-auth
          path: .errors-source/stapel-auth
      - uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-core
          path: .errors-source/stapel-core

      - name: Codegen drift gates (api / flows / errors / manifest)
        # Regenerates the committed projections from the pinned backend sources
        # and fails if any diverge — types, the flow registry, the backend-error
        # map, and the manifest/llms.txt self-description all under one gate.
        run: corepack pnpm gen:check
        env:
          API_SCHEMA: ${{ github.workspace }}/.codegen-source/codegen/generated/schema.json
          FLOWS_JSON: ${{ github.workspace }}/.codegen-source/codegen/generated/flows.json
          AUTH_ERRORS_SOURCES: ${{ github.workspace }}/.errors-source/stapel-auth/errors.py,${{ github.workspace }}/.errors-source/stapel-core/verification/grants.py,${{ github.workspace }}/.errors-source/stapel-core/verification/errors.py

      - name: Lint, test, build, size
        run: corepack pnpm turbo run lint test build size

      - name: Standalone build gate (frontend-standard §7)
        run: |
          for pkg in packages/*/; do
            echo "--- standalone build: $pkg"
            (cd "$pkg" && corepack pnpm run build)
          done

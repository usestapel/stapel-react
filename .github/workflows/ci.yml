name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Tolerate corepack versions predating the 2025 npm signing-key rotation.
  COREPACK_INTEGRITY_KEYS: "0"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load contract pins (contract-pins.json)
        # §17 pin B: every sibling-backend checkout below is pinned to an
        # immutable ref from contract-pins.json — the single visible place the
        # pins live. Bumping a pin is a deliberate PR after the backend
        # releases a new contract (CONTRIBUTING.md "Contract pins"); never
        # float main. NOTE: the current pins are the siblings' LOCAL HEAD shas
        # (contract commits not pushed/tagged yet) — GitHub can only resolve
        # them once the backend push wave lands; a checkout failure before
        # that is expected and fine.
        id: pins
        run: echo "pins=$(jq -c .modules contract-pins.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Check out contract artifacts (stapel-auth)
        # The generated backend-error map (gen:errors) now reads the backend's
        # CANONICAL `errors.json` codegen artifact — emitted by stapel-auth
        # alongside schema.json/flows.json (task `error-remediation`) and
        # committed at `docs/errors.json`. No more Python-source parsing, so the
        # stapel-core verification-registry checkout this step used to need is
        # gone; only the stapel-auth artifact remains.
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-auth
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-auth'].ref }}
          path: .errors-source/stapel-auth

      # gen:api / gen:flows / gen:errors / gen:manifest hardcode
      # `../stapel-<module>` for every pair (package.json scripts).
      # actions/checkout refuses a path outside the workspace root, so these
      # land nested and get symlinked into place below (same fix as release.yml).
      - name: Check out stapel-notifications (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-notifications
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-notifications'].ref }}
          path: .other-source/stapel-notifications

      - name: Check out stapel-profiles (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-profiles
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-profiles'].ref }}
          path: .other-source/stapel-profiles

      - name: Check out stapel-billing (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-billing
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-billing'].ref }}
          path: .other-source/stapel-billing

      - name: Check out stapel-workspaces (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-workspaces
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-workspaces'].ref }}
          path: .other-source/stapel-workspaces

      - name: Check out stapel-calendar (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-calendar
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-calendar'].ref }}
          path: .other-source/stapel-calendar

      - name: Check out stapel-recordings (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-recordings
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-recordings'].ref }}
          path: .other-source/stapel-recordings

      - name: Symlink sibling repos to where the gen:* drivers expect them
        # stapel-auth included: gen:api/gen:flows read ../stapel-auth/docs/*
        # inline from package.json, same as every other pair.
        run: |
          ln -sf "$GITHUB_WORKSPACE/.errors-source/stapel-auth" "$GITHUB_WORKSPACE/../stapel-auth"
          for m in stapel-notifications stapel-profiles stapel-billing stapel-workspaces stapel-calendar stapel-recordings; do
            ln -sf "$GITHUB_WORKSPACE/.other-source/$m" "$GITHUB_WORKSPACE/../$m"
          done

      - name: Codegen drift gates (api / flows / errors / manifest)
        # Regenerates the committed projections from the pinned backend sources
        # and fails if any diverge — types, the flow registry, the backend-error
        # map, and the manifest/llms.txt self-description all under one gate.
        # Sources are per-module: every gen invocation passes its own backend's
        # committed docs/*.json inline (package.json scripts) — the monolith
        # aggregate is retired as a contract source (contract-pipeline.md §5), so
        # its checkout + the API_SCHEMA/FLOWS_JSON env pointing at it are gone.
        # Only the two BARE invocations (auth gen:errors / gen:manifest) still
        # read env: the stapel-auth error registry + pyproject version pin.
        run: corepack pnpm gen:check
        env:
          AUTH_ERRORS_JSON: ${{ github.workspace }}/.errors-source/stapel-auth/docs/errors.json
          # Backend version pin → manifest backend.contract (gen:manifest).
          MANIFEST_BACKEND_PYPROJECT: ${{ github.workspace }}/.errors-source/stapel-auth/pyproject.toml

      - name: CSS guardrail (stylelint)
        # The CSS half of the guardrails (frontend-guardrails §2.2): colours in
        # .css only as var(--stapel-*) tokens. ESLint ignores *.css, so this is
        # the only gate over hand-written stylesheets (e.g. the viewer's).
        run: corepack pnpm lint:css

      - name: Lint, test, build, size
        run: corepack pnpm turbo run lint test build size

      - name: Pack purity gate (§5.1, serialized)
        # Each pair's prodBundlePurity suite shells out to `npm pack --dry-run`
        # — real I/O that flaked inside the parallel turbo `test` graph. It is
        # excluded from the per-package `test` script and runs here one package
        # at a time (pnpm --workspace-concurrency=1), contention-free.
        run: corepack pnpm run test:pack

      - name: Standalone build gate (frontend-standard §7)
        # --if-present: the gate proves every PUBLISHED package builds in
        # isolation; the private showcase-viewer app has no `build` script
        # (its Ladle build runs behind the STAPEL_INTROSPECTION gate, §5).
        run: |
          for pkg in packages/*/; do
            echo "--- standalone build: $pkg"
            (cd "$pkg" && corepack pnpm run --if-present build)
          done

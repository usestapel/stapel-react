name: Release

# Publishes the @stapel/* packages to npm via Changesets. On push to main with
# pending .changeset/*.md files it opens/updates a "Version Packages" PR (bumps
# versions + changelogs); once that PR is merged (no changesets left) the next
# run builds and runs `changeset publish` to publish to npm with provenance.
#
# Auth: npm OIDC **trusted publishing** (tokenless). Configure a trusted
# publisher on npm for each @stapel/* package pointing at this repo + workflow
# (usestapel/stapel-react, release.yml). The publish step runs with
# id-token: write and a recent npm CLI, so `changeset publish` exchanges the
# OIDC token automatically — no NPM_TOKEN needed. (If a package can't be
# bootstrapped tokenlessly, do a one-time manual `npm publish` to create it,
# then trusted publishing handles subsequent releases.)

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

env:
  COREPACK_INTEGRITY_KEYS: "0"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the version commit / tags
      pull-requests: write   # open the "Version Packages" PR
      id-token: write        # npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      # `pnpm run release` = `pnpm run ci && changeset publish` — the same
      # codegen drift gate as ci.yml runs, so a release can't ship generated
      # code (schema.ts, flows, error maps, manifests) that has drifted from
      # the backend contract. That gate reads its sources from sibling repos —
      # checked out here exactly as ci.yml does. The monolith aggregate is
      # retired as a contract source (contract-pipeline.md §5): its checkout is
      # gone; sources are per-module.
      - name: Load contract pins (contract-pins.json)
        # §17 pin B: every sibling-backend checkout below is pinned to an
        # immutable ref from contract-pins.json — the single visible place the
        # pins live (shared with ci.yml). Bumping a pin is a deliberate PR
        # after the backend releases a new contract (CONTRIBUTING.md
        # "Contract pins"); never float main. NOTE: the current pins are the
        # siblings' LOCAL HEAD shas (contract commits not pushed/tagged yet) —
        # GitHub can only resolve them once the backend push wave lands; a
        # checkout failure before that is expected and fine.
        id: pins
        run: echo "pins=$(jq -c .modules contract-pins.json)" >> "$GITHUB_OUTPUT"

      - name: Check out contract artifacts (stapel-auth)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-auth
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-auth'].ref }}
          path: .errors-source/stapel-auth

      # gen:api / gen:flows / gen:errors / gen:manifest hardcode
      # `../stapel-<module>` for every pair (package.json scripts).
      # actions/checkout refuses a path outside the workspace root, so these
      # land nested and get symlinked into place below.
      - name: Check out stapel-notifications (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-notifications
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-notifications'].ref }}
          path: .other-source/stapel-notifications

      - name: Check out stapel-profiles (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-profiles
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-profiles'].ref }}
          path: .other-source/stapel-profiles

      - name: Check out stapel-billing (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-billing
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-billing'].ref }}
          path: .other-source/stapel-billing

      - name: Check out stapel-workspaces (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-workspaces
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-workspaces'].ref }}
          path: .other-source/stapel-workspaces

      - name: Check out stapel-calendar (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-calendar
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-calendar'].ref }}
          path: .other-source/stapel-calendar

      - name: Check out stapel-recordings (contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-recordings
          ref: ${{ fromJSON(steps.pins.outputs.pins)['stapel-recordings'].ref }}
          path: .other-source/stapel-recordings

      - name: Symlink sibling repos to where the gen:* drivers expect them
        # stapel-auth included: gen:api/gen:flows read ../stapel-auth/docs/*
        # inline from package.json, same as every other pair.
        run: |
          ln -sf "$GITHUB_WORKSPACE/.errors-source/stapel-auth" "$GITHUB_WORKSPACE/../stapel-auth"
          for m in stapel-notifications stapel-profiles stapel-billing stapel-workspaces stapel-calendar stapel-recordings; do
            ln -sf "$GITHUB_WORKSPACE/.other-source/$m" "$GITHUB_WORKSPACE/../$m"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable corepack (pnpm)
        run: corepack enable

      # npm >= 11.5.1 is required for OIDC trusted publishing. Pin to the 11.x
      # line rather than `@latest`: npm 12 (a) declares it does not support the
      # runners' Node 22 (`^22.22.2 || ^24 || >=26`), and (b) changed its
      # `pack`/`publish` --json output shapes, which breaks changesets@2.31.0 —
      # a failed publish crashes in isAlreadyPublishedError (`json.error.summary`
      # is undefined on npm 12) with a TypeError that masks the real npm error
      # (e.g. an E403). npm 11 keeps the shapes changesets expects.
      - name: Upgrade npm (OIDC trusted publishing)
        run: npm install -g npm@11

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Version PR or publish to npm
        uses: changesets/action@v1
        with:
          # `version-packages` = `changeset version && pnpm gen`. The bump
          # rewrites each package.json version, and FOUR generated artifact
          # families embed that version inline — events.json ($.version),
          # manifest.json + llms.txt (`# @stapel/<pkg> <version>`), demos.json
          # ($.version), and the tokens manifest/llms. If any is not regenerated
          # in the same step, the Version-PR's own CI fails its gen:* drift gate
          # (the embedded version lags the bumped package.json), and because
          # gen:check short-circuits (`&&`) the failures surface one layer at a
          # time. Running the FULL `pnpm gen` regenerates every family from the
          # same pinned sources CI checks against, so no version-embed layer can
          # be missed. gen reads the siblings (symlinked above) + env
          # (AUTH_ERRORS_JSON/MANIFEST_BACKEND_PYPROJECT below), both present in
          # this job. The action's post-version `git add . && commit` carries the
          # regenerated artifacts onto the changeset-release/main branch.
          version: corepack pnpm run version-packages
          publish: corepack pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tokenless: OIDC trusted publishing (id-token: write + provenance).
          # The first publish of each package is bootstrapped locally
          # (`pnpm -r publish`), then a trusted publisher is configured on npm.
          NPM_CONFIG_PROVENANCE: "true"
          # Per-module sources are inline in package.json; only the two bare gen
          # invocations (auth gen:errors / gen:manifest) read env. Monolith env
          # (API_SCHEMA/FLOWS_JSON → .codegen-source) removed with its checkout.
          AUTH_ERRORS_JSON: ${{ github.workspace }}/.errors-source/stapel-auth/docs/errors.json
          MANIFEST_BACKEND_PYPROJECT: ${{ github.workspace }}/.errors-source/stapel-auth/pyproject.toml

name: Release

# Publishes the @stapel/* packages to npm via Changesets. On push to main with
# pending .changeset/*.md files it opens/updates a "Version Packages" PR (bumps
# versions + changelogs); once that PR is merged (no changesets left) the next
# run builds and runs `changeset publish` to publish to npm with provenance.
#
# Auth: npm OIDC **trusted publishing** (tokenless). Configure a trusted
# publisher on npm for each @stapel/* package pointing at this repo + workflow
# (usestapel/stapel-react, release.yml). The publish step runs with
# id-token: write and a recent npm CLI, so `changeset publish` exchanges the
# OIDC token automatically — no NPM_TOKEN needed. (If a package can't be
# bootstrapped tokenlessly, do a one-time manual `npm publish` to create it,
# then trusted publishing handles subsequent releases.)

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

env:
  COREPACK_INTEGRITY_KEYS: "0"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the version commit / tags
      pull-requests: write   # open the "Version Packages" PR
      id-token: write        # npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      # `pnpm run release` = `pnpm run ci && changeset publish` — the same
      # codegen drift gate as ci.yml runs, so a release can't ship generated
      # code (schema.ts, flows, error maps, manifests) that has drifted from
      # the backend contract. That gate reads its sources from sibling repos —
      # checked out here exactly as ci.yml does.
      - name: Check out codegen source (monolith schema.json + flows.json)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-example-monolith
          path: .codegen-source

      - name: Check out error-registry artifact (stapel-auth)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-auth
          path: .errors-source/stapel-auth

      # gen:errors / gen:manifest hardcode `../stapel-<module>` for the
      # notifications/profiles/billing/workspaces pairs (package.json scripts),
      # so those four need true sibling checkouts, not nested ones.
      - name: Check out stapel-notifications (errors.json + pyproject.toml)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-notifications
          path: ../stapel-notifications

      - name: Check out stapel-profiles (errors.json + pyproject.toml)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-profiles
          path: ../stapel-profiles

      - name: Check out stapel-billing (errors.json + pyproject.toml)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-billing
          path: ../stapel-billing

      - name: Check out stapel-workspaces (errors.json + pyproject.toml)
        uses: actions/checkout@v4
        with:
          repository: usestapel/stapel-workspaces
          path: ../stapel-workspaces

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable corepack (pnpm)
        run: corepack enable

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - name: Upgrade npm (OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Version PR or publish to npm
        uses: changesets/action@v1
        with:
          version: corepack pnpm run version-packages
          publish: corepack pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tokenless: OIDC trusted publishing (id-token: write + provenance).
          # The first publish of each package is bootstrapped locally
          # (`pnpm -r publish`), then a trusted publisher is configured on npm.
          NPM_CONFIG_PROVENANCE: "true"
          API_SCHEMA: ${{ github.workspace }}/.codegen-source/codegen/generated/schema.json
          FLOWS_JSON: ${{ github.workspace }}/.codegen-source/codegen/generated/flows.json
          AUTH_ERRORS_JSON: ${{ github.workspace }}/.errors-source/stapel-auth/docs/errors.json
          MANIFEST_BACKEND_PYPROJECT: ${{ github.workspace }}/.errors-source/stapel-auth/pyproject.toml
